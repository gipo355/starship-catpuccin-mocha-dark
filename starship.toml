"$schema" = 'https://starship.rs/config-schema.json'

format = """
$username${custom.localip}$hostname$aws$terraform$docker_context$kubernetes
[‚ē≠‚ĒÄ](fg:surface2)\
[Óā∂](surface0)\
$directory\
${custom.git_sep}\
${custom.worktree}\
$git_branch\
$git_status\
$c\
$rust\
$golang\
$nodejs\
$php\
$java\
$kotlin\
$haskell\
$python\
$conda\
$jobs\
[‚Ēā](fg:surface2 bg:surface0)\
$time\
[Óāī ](fg:surface0)\
$cmd_duration\
$line_break\
$character"""

palette = 'catppuccin_mocha'

[username]
show_always = true
style_user = "bold fg:lavender"
style_root = "bold fg:red"
format = '[   $user]($style)'

[directory]
style = "bold fg:blue bg:surface0"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "‚Ä¶/"
before_repo_root_style = "fg:overlay1 bg:surface0"
repo_root_style = "bold fg:blue bg:surface0"
repo_root_format = "[ $before_root_path]($before_repo_root_style)[$repo_root]($repo_root_style)[$path ]($style)"

[directory.substitutions]
"Documents" = "ůįąô "
"Downloads" = "ÔÄô "
"Music" = "ůįĚö "
"Pictures" = "ÔÄĺ "
"Developer" = "ůį≤č "

[git_branch]
symbol = "Ôźė"
style = "bg:surface0"
format = '([[$symbol $branch ](bold fg:mauve bg:surface0)]($style))'

[git_status]
style = "bg:surface0"
format = '([‚Ēā](fg:surface2 bg:surface0)[ $all_status$ahead_behind]($style))'
conflicted = "[=${count} ](bold fg:red bg:surface0)"
ahead = "[‚á°${count} ](bold fg:green bg:surface0)"
behind = "[‚á£${count} ](bold fg:red bg:surface0)"
diverged = "[‚áē‚á°${ahead_count} ‚á£${behind_count} ](bold fg:flamingo bg:surface0)"
up_to_date = "[‚úď ](bold fg:green bg:surface0)"
untracked = "[?${count} ](bold fg:sky bg:surface0)"
stashed = "[*${count} ](bold fg:teal bg:surface0)"
modified = "[!${count} ](bold fg:peach bg:surface0)"
staged = "[+${count} ](bold fg:green bg:surface0)"
renamed = "[¬Ľ${count} ](bold fg:blue bg:surface0)"
deleted = "[‚úė${count} ](bold fg:red bg:surface0)"

[nodejs]
symbol = "Óúė"
style = "bg:surface0"
format = '[‚Ēā](fg:surface2 bg:surface0)[[ $symbol( $version) ](fg:teal bg:surface0)]($style)'

[c]
symbol = "Óėě "
style = "bg:surface0"
format = '[‚Ēā](fg:surface2 bg:surface0)[[ $symbol( $version) ](fg:teal bg:surface0)]($style)'

[rust]
symbol = "Óě®"
style = "bg:surface0"
format = '[‚Ēā](fg:surface2 bg:surface0)[[ $symbol( $version) ](fg:teal bg:surface0)]($style)'

[golang]
symbol = "Óėß"
style = "bg:surface0"
format = '[‚Ēā](fg:surface2 bg:surface0)[[ $symbol( $version) ](fg:teal bg:surface0)]($style)'

[php]
symbol = "Óėą"
style = "bg:surface0"
format = '[‚Ēā](fg:surface2 bg:surface0)[[ $symbol( $version) ](fg:teal bg:surface0)]($style)'

[java]
symbol = "ÓČĖ "
style = "bg:surface0"
format = '[‚Ēā](fg:surface2 bg:surface0)[[ $symbol( $version) ](fg:teal bg:surface0)]($style)'

[kotlin]
symbol = "Óėī"
style = "bg:surface0"
format = '[‚Ēā](fg:surface2 bg:surface0)[[ $symbol( $version) ](fg:teal bg:surface0)]($style)'

[haskell]
symbol = "Óėü"
style = "bg:surface0"
format = '[‚Ēā](fg:surface2 bg:surface0)[[ $symbol( $version) ](fg:teal bg:surface0)]($style)'

[python]
symbol = "ÓėÜ"
style = "bg:surface0"
format = '[‚Ēā](fg:surface2 bg:surface0)[[ $symbol( $version)(\(#$virtualenv\)) ](fg:teal bg:surface0)]($style)'

[docker_context]
symbol = "ÔĆą"
style = "fg:sapphire"
format = '[$symbol $context]($style) '

[kubernetes]
disabled = false
symbol = "ůĪÉĺ"
style = "fg:teal"
format = '[$symbol $context( \($namespace\))]($style) '

[[kubernetes.contexts]]
context_pattern = ".*production.*"
context_alias = "prod"
style = "bold fg:crust bg:red"
symbol = "ůĪÉĺ"

[[kubernetes.contexts]]
context_pattern = ".*staging.*"
context_alias = "stg"
style = "fg:crust bg:yellow"
symbol = "ůĪÉĺ"

[custom.git_sep]
command = "echo ' '"
when = "git rev-parse --is-inside-work-tree 2>/dev/null"
style = "bg:surface0"
format = '[‚Ēā ](fg:surface2 bg:surface0)'

[custom.worktree]
command = "wt=$(ls \"$(git rev-parse --git-common-dir)/worktrees\" 2>/dev/null | wc -l); [ \"$wt\" -gt 0 ] && echo \"$((wt + 1))\""
when = "ls \"$(git rev-parse --git-common-dir 2>/dev/null)/worktrees\" 2>/dev/null | grep -q ."
style = "bg:surface0"
format = '[[$output ](bold fg:flamingo bg:surface0)]($style)'

[custom.localip]
command = "main=$(ip -o -4 route get 1 | awk '{print $5\"(\"$7\")\"}'); vpn=$(ip -o -4 addr show | awk '/tun[0-9]|tap[0-9]|wg[0-9]/{split($4,a,\"/\"); print $2\"(\"a[1]\")\"}' | head -1); if [ -n \"$vpn\" ]; then echo \"$main ůįĖā $vpn\"; else echo \"$main\"; fi"
when = true
symbol = " "
style = "fg:lavender"
format = '[$symbol$output]($style) '

[conda]
symbol = " ÔĄĆ "
style = "fg:peach bg:surface0"
format = '[‚Ēā](fg:surface2 bg:surface0)[ $symbol$environment ]($style)'
ignore_base = false

[time]
disabled = false
time_format = "%R"
style = "bg:surface0"
format = '[[ Ôźļ $time ](fg:subtext1 bg:surface0)]($style)'

[aws]
symbol = "ůįłŹ "
style = "fg:peach"
format = '[$symbol$profile( \($region\))]($style) '
[aws.profile_aliases]
"default" = ""

[terraform]
symbol = "ůĪĀĘ"
style = "fg:mauve"
format = '[$symbol $workspace]($style) '

[hostname]
ssh_only = true
style = "bold fg:red"
format = '[ ůį£Ä $hostname]($style) '

[jobs]
symbol = "ůįúé"
style = "bold fg:yellow bg:surface0"
format = '[‚Ēā](fg:surface2 bg:surface0)[ $symbol $number ]($style)'
number_threshold = 1

[line_break]
disabled = false

[character]
disabled = false
success_symbol = '[‚ēį‚ĒÄ](fg:surface2) [‚ĚĮ](bold fg:green)'
error_symbol = '[‚ēį‚ĒÄ](fg:surface2) [‚ĚĮ](bold fg:red)'
vimcmd_symbol = '[‚ēį‚ĒÄ](fg:green) [‚Ěģ](bold fg:green)'
vimcmd_replace_one_symbol = '[‚ēį‚ĒÄ](fg:lavender) [‚Ěģ](bold fg:lavender)'
vimcmd_replace_symbol = '[‚ēį‚ĒÄ](fg:lavender) [‚Ěģ](bold fg:lavender)'
vimcmd_visual_symbol = '[‚ēį‚ĒÄ](fg:yellow) [‚Ěģ](bold fg:yellow)'

[cmd_duration]
show_milliseconds = true
format = " Óęī $duration "
style = "fg:peach"
disabled = false
show_notifications = true
min_time_to_notify = 45000

[palettes.catppuccin_mocha]
rosewater = "#f5e0dc"
flamingo = "#f2cdcd"
pink = "#f5c2e7"
mauve = "#cba6f7"
red = "#f38ba8"
maroon = "#eba0ac"
peach = "#fab387"
yellow = "#f9e2af"
green = "#a6e3a1"
teal = "#94e2d5"
sky = "#89dceb"
sapphire = "#74c7ec"
blue = "#89b4fa"
lavender = "#b4befe"
text = "#cdd6f4"
subtext1 = "#bac2de"
subtext0 = "#a6adc8"
overlay2 = "#9399b2"
overlay1 = "#7f849c"
overlay0 = "#6c7086"
